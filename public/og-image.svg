<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1B2E6B"/>

  <!-- Subtle border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#B87B6A" stroke-width="0.5" opacity="0.3"/>

  <!-- Decorative line top-left -->
  <line x1="60" y1="80" x2="180" y2="80" stroke="#B87B6A" stroke-width="1" opacity="0.5"/>

  <!-- C — serif, cream -->
  <text x="560" y="270" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="120" font-weight="600" fill="#F7F2EC" letter-spacing="-2">
    C
  </text>

  <!-- V — script, terracota -->
  <text x="650" y="275" text-anchor="middle" font-family="'Dancing Script', 'Brush Script MT', cursive" font-size="96" font-weight="600" fill="#B87B6A">
    V
  </text>

  <!-- Decorative line center -->
  <line x1="510" y1="295" x2="690" y2="295" stroke="#B87B6A" stroke-width="0.75" opacity="0.4"/>

  <!-- Name -->
  <text x="600" y="360" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="42" font-weight="300" fill="#F7F2EC" letter-spacing="4">
    CATALINA VILLAFAÑE
  </text>

  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="'Inter', 'system-ui', sans-serif" font-size="18" fill="#F7F2EC" opacity="0.6" letter-spacing="3">
    CONSULTORA &amp; MENTORA DE NEGOCIOS
  </text>

  <!-- Bottom accent -->
  <text x="600" y="510" text-anchor="middle" font-family="'Georgia', serif" font-size="22" font-style="italic" fill="#B87B6A" opacity="0.7">
    Negocios que crecen con estrategia y propósito.
  </text>

  <!-- Decorative line bottom-right -->
  <line x1="1020" y1="550" x2="1140" y2="550" stroke="#B87B6A" stroke-width="1" opacity="0.5"/>
</svg>
